services:
  panel:
    build:
      context: .
      args:
        PANEL_VERSION: ${PANEL_VERSION:-1.0.0}
        PANEL_BUILD: ${PANEL_BUILD:-local}
    container_name: panel
    restart: unless-stopped
    privileged: true
    pid: host
    ports:
      - "127.0.0.1:7777:7777"
    env_file:
      - .env
    environment:
      PORT: 7777
      HOST_ROOT: /host
      PANEL_VERSION: ${PANEL_VERSION:-1.0.0}
      PANEL_BUILD: ${PANEL_BUILD:-local}
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:7777/api/me').then(r => process.exit(r.status === 401 ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s
    volumes:
      - /:/host:rw
